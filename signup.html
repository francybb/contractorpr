{

        .form-header p {

        .form-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group label .required {
            color: #e74c3c;
        }

        .form-group input,
        .form-group select {
            width: 100%;

s: 8px;

        .form-group input.error,

        .form-group .error-message {
            color: #e74c3c;

        }

        .form-group .hint {
            color: #666;

            margin-top: 5px;
        }

        .phone-input {
            display: flex;

        .phone-input .prefix {
            width: 80px;

            flex-shrink: 0;
        }

        .phone-input input[type="tel"] {
            flex: 1;
        }

        .submit-btn {
            width: 100%;

        .submit-btn:hover {
            background: #0052a3;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .form-footer {

        .form-footer a
{

            text-decoration: underline;
        }

        .lang-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);

        .success-message .checkmark svg {
            width: 40px;

            stroke: white;
        }

        .success-message h2 {
            color: #333;
            margin-bottom: 10px;
        }

        .success-message p {
            color: #666;

</head>
