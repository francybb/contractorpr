<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContractingPR · Inicio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B1F33;--ink-2:#3A4A5C;--muted:#6B7A8D;
  --blue:#1A56DB;--blue-deep:#103FA8;--blue-soft:#EBF1FE;
  --canvas:#F6F7F9;--card:#FFFFFF;--line:#E6E9EF;--line-2:#EFF1F5;
  --ok:#0E9F6E;--ok-soft:#E3F5EE;--warn:#E08A00;--warn-soft:#FBF1DF;--rose:#D6336C;--post:#64748B;--post-soft:#EEF1F5;--violet:#7C5BD6;
  --radius:16px;--shadow:0 1px 2px rgba(11,31,51,.04),0 8px 24px -12px rgba(11,31,51,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--canvas);color:var(--ink);line-height:1.5}
.wrap{max-width:1080px;margin:0 auto;padding:36px 22px 80px}
.serif{font-family:'Fraunces',serif}
.loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:90px 0;color:var(--muted)}
.spinner{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hero{display:flex;align-items:center;gap:18px;margin-bottom:28px;flex-wrap:wrap}
.h-av{width:64px;height:64px;border-radius:50%;overflow:hidden;background:var(--line-2);display:grid;place-items:center;flex-shrink:0;border:1px solid var(--line);color:#B6C0CC}
.h-av img{width:100%;height:100%;object-fit:cover}.h-av svg{width:36px;height:36px}
.h-main{flex:1;min-width:200px}
.h-eyebrow{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:4px}
.h-main h1{font-family:'Fraunces',serif;font-size:30px;font-weight:500;letter-spacing:-.02em}
.h-sub{display:flex;align-items:center;gap:12px;margin-top:7px;flex-wrap:wrap}
.status-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px}
.status-badge.pending{background:var(--warn-soft);color:var(--warn)}.status-badge.active{background:var(--ok-soft);color:var(--ok)}
.status-badge svg{width:13px;height:13px}
.rating{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-2)}
.rating .stars{color:#F5A623;letter-spacing:1px}
.h-edit{background:var(--card);border:1px solid var(--line);color:var(--ink-2);padding:9px 16px;border-radius:10px;font-weight:600;font-size:13.5px;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:7px}
.h-edit:hover{background:var(--line-2)}.h-edit svg{width:15px;height:15px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px}
@media(max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow)}
.stat .v{font-family:'Fraunces',serif;font-size:26px;font-weight:500}.stat .v.money{color:var(--blue)}
.stat .k{font-size:12.5px;color:var(--muted);margin-top:3px;font-weight:500}
.stat-link{text-decoration:none;color:inherit;display:block;transition:.15s}
.stat-link:hover{border-color:var(--blue);box-shadow:0 4px 14px -6px rgba(26,86,219,.3)}
.sec{margin-bottom:34px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:14px}
.sec-head h2{font-family:'Fraunces',serif;font-size:20px;font-weight:500}
.sec-head a{font-size:13.5px;font-weight:600;color:var(--blue);text-decoration:none}
.job-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.job-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;display:block;text-decoration:none;color:inherit}
.job-card:hover{border-color:var(--blue);box-shadow:0 6px 18px -8px rgba(26,86,219,.25);transform:translateY(-2px)}
.job-card .jt{font-size:15px;font-weight:600;margin-bottom:9px}
.job-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
.trade-chip{background:var(--blue-soft);color:var(--blue);font-weight:600;padding:3px 9px;border-radius:20px;font-size:11.5px}
.job-foot{display:flex;align-items:center;justify-content:space-between;margin-top:13px;padding-top:12px;border-top:1px solid var(--line-2)}
.job-budget{font-family:'Fraunces',serif;font-weight:500;color:var(--ink-2)}
.job-go{font-size:12.5px;font-weight:600;color:var(--blue)}
.attn-list{display:flex;flex-direction:column;gap:10px}
.attn-card{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 16px;text-decoration:none;color:inherit;transition:.15s;box-shadow:var(--shadow)}
.attn-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.attn-ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex-shrink:0;background:var(--blue-soft);color:var(--blue)}
.attn-ic svg{width:18px;height:18px}
.attn-card.k-review .attn-ic{background:#FEF3D7;color:#F5A623}.attn-card.k-counter .attn-ic{background:var(--warn-soft);color:var(--warn)}.attn-card.k-quote .attn-ic{background:var(--ok-soft);color:var(--ok)}
.attn-b{flex:1;min-width:0;display:flex;flex-direction:column}
.attn-t{font-size:14.5px;font-weight:600}.attn-s{font-size:12.5px;color:var(--muted);margin-top:2px}
.attn-go{color:var(--blue);font-weight:700;font-size:16px}
.prop-list{display:flex;flex-direction:column;gap:10px}
.prop-row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px 16px;text-decoration:none;color:inherit;transition:.15s}
.prop-row:hover{border-color:var(--line-2);box-shadow:var(--shadow)}
.prop-main{flex:1;min-width:0}.prop-t{font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prop-s{font-size:12.5px;color:var(--muted);margin-top:2px}
.prop-price{text-align:right;flex-shrink:0}
.prop-price .p{font-family:'Fraunces',serif;font-weight:500}.prop-price .pay{font-size:11.5px;color:var(--ok);font-weight:600}
.pill{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.03em;flex-shrink:0;white-space:nowrap}
.pill.pending{background:var(--warn-soft);color:var(--warn)}.pill.accepted{background:var(--blue-soft);color:var(--blue)}.pill.completed{background:var(--ok-soft);color:var(--ok)}.pill.declined{background:var(--post-soft);color:var(--post)}
.empty{text-align:center;padding:38px 20px;color:var(--muted);background:var(--card);border:1px dashed var(--line);border-radius:14px}
.empty h3{font-size:15px;color:var(--ink);margin-bottom:5px}.empty p{font-size:13.5px;max-width:40ch;margin:0 auto 12px}
.empty .btn{display:inline-block;background:var(--blue);color:#fff;padding:10px 18px;border-radius:9px;font-weight:600;font-size:13.5px;text-decoration:none}
</style>
</head>
<body>
<div id="cpr-nav-placeholder"></div>
<div class="wrap">
  <div id="boot" class="loading"><div class="spinner"></div><span id="boot-msg">Cargando...</span></div>
  <script>(function(){try{var l=localStorage.getItem("cpr_lang")||"es";document.getElementById("boot-msg").textContent=(l==="en"?"Loading...":"Cargando...");}catch(e){}})();</script>
  <div id="home" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/lang.js"></script>
<script>
var lang = (window.CPR && CPR.lang) || 'es';
var me = null, proposals = [], jobsById = {}, openJobs = [], inviteJobs = [], reviewedJobs = {}, rating = {avg:0, count:0};
var FACELESS='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12a5 5 0 100-10 5 5 0 000 10zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5z"/></svg>';
var T={
  eyebrow:{es:'Portal de Contratista',en:'Contractor Portal'},
  hi:{es:'Hola',en:'Hi'},
  stPending:{es:'En revisión',en:'Under review'},stActive:{es:'Verificado',en:'Verified'},
  noRating:{es:'Sin reseñas aún',en:'No reviews yet'},
  edit:{es:'Mi perfil',en:'My profile'},cal:{es:'Calendario',en:'Calendar'},
  sPending:{es:'Propuestas pendientes',en:'Pending proposals'},sActive:{es:'Trabajos activos',en:'Active jobs'},sDone:{es:'Completados',en:'Completed'},sEarn:{es:'Ganancias',en:'Earnings'},
  forYou:{es:'Trabajos para ti',en:'Jobs for you'},browseAll:{es:'Ver todos →',en:'Browse all →'},
  myProps:{es:'Mis propuestas',en:'My proposals'},
  invitesT:{es:'Te invitaron a cotizar',en:'You’re invited to quote'},invitesBadge:{es:'invitación',en:'invite'},invitesBadgeP:{es:'invitaciones',en:'invites'},
  atnTitle:{es:'Necesita tu atención',en:'Needs your attention'},
  atnQuote:{es:'Visita confirmada — envía tu cotización',en:'Visit confirmed — send your quote'},
  atnCounter:{es:'El cliente contraofertó — responde',en:'Client countered — respond'},
  atnSchedule:{es:'Coordina la fecha del trabajo',en:'Schedule the job date'},
  atnReview:{es:'Deja una reseña del cliente',en:'Leave a review of the client'},
  noJobsT:{es:'No hay trabajos abiertos ahora',en:'No open jobs right now'},noJobsP:{es:'Vuelve pronto o explora todos los trabajos disponibles.',en:'Check back soon or browse all available jobs.'},browseBtn:{es:'Ver trabajos',en:'Browse jobs'},
  noPropsT:{es:'Aún no has enviado propuestas',en:'No proposals sent yet'},noPropsP:{es:'Explora trabajos abiertos y envía tu primera propuesta.',en:'Browse open jobs and send your first proposal.'},
  ppPending:{es:'Pendiente',en:'Pending'},ppAccepted:{es:'Aceptada — activa',en:'Accepted — active'},ppCompleted:{es:'Completada',en:'Completed'},ppDeclined:{es:'Denegada',en:'Denied'},
  ppVisit:{es:'Visita solicitada',en:'Visit requested'},ppVisitOk:{es:'Visita confirmada',en:'Visit confirmed'},ppQuoted:{es:'Cotizada',en:'Quoted'},ppCountered:{es:'Contraoferta',en:'Countered'},ppInquiry:{es:'Conversación',en:'Conversation'},
  receive:{es:'recibes',en:'you get'},posted:{es:'Publicado',en:'Posted'},noBudget:{es:'Precio por cotizar',en:'Open to quote'}
};
function el(id){return document.getElementById(id);}
function t(k){var e=T[k];return e?(e[lang]||e.es):k;}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function money(n){return '$'+Math.round(n).toLocaleString('en-US');}
function numv(b){ var v=parseFloat(String(b||'').replace(/[^0-9.]/g,'')); return isNaN(v)?0:v; }
function fmtDate(ts){ try{ return new Date(ts).toLocaleDateString(lang==='en'?'en-US':'es-ES',{month:'short',day:'numeric'}); }catch(e){ return ''; } }
function schedWhen(j){ if(!j||!j.scheduled_date) return ''; try{ var d=new Date(j.scheduled_date+'T00:00:00'); return d.toLocaleDateString(lang==='en'?'en-US':'es-ES',{month:'short',day:'numeric'})+(j.scheduled_time?' · '+j.scheduled_time:''); }catch(e){ return ''; } }
function tradeEs(tr){ return (tr||'').split('/')[0].trim(); }
function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim(); }

async function loadHome(){
  proposals = await CPR.db('proposals?contractor_id=eq.'+encodeURIComponent(me.id)+'&order=created_at.desc&select=*');
  proposals = Array.isArray(proposals)?proposals:[];
  var jobIds = proposals.map(function(p){return p.job_id;}).filter(Boolean);
  jobsById = {};
  if(jobIds.length){
    var js = await CPR.db('jobs?id=in.('+jobIds.join(',')+')&select=id,title,trade_needed,city,status,budget,scheduled_date');
    (Array.isArray(js)?js:[]).forEach(function(j){ jobsById[j.id]=j; });
  }
  reviewedJobs = {};
  var myRevs = await CPR.db('reviews?contractor_id=eq.'+encodeURIComponent(me.id)+'&direction=eq.contractor_to_client&select=job_id');
  (Array.isArray(myRevs)?myRevs:[]).forEach(function(r){ reviewedJobs[r.job_id]=1; });
  openJobs = await CPR.db('jobs?status=eq.open&order=created_at.desc&select=id,title,trade_needed,city,status,budget,created_at&limit=40');
  openJobs = Array.isArray(openJobs)?openJobs:[];
  inviteJobs = [];
  var inv = await CPR.db('job_invites?contractor_id=eq.'+encodeURIComponent(me.id)+'&status=in.(sent,viewed)&order=created_at.desc&select=job_id');
  inv = Array.isArray(inv)?inv:[];
  var proposedIds = {}; proposals.forEach(function(p){ proposedIds[p.job_id]=1; });
  var invIds = []; inv.forEach(function(x){ if(x.job_id && invIds.indexOf(x.job_id)<0) invIds.push(x.job_id); });
  if(invIds.length){
    var ij = await CPR.db('jobs?id=in.('+invIds.join(',')+')&select=id,title,trade_needed,city,status,budget,created_at');
    inviteJobs = (Array.isArray(ij)?ij:[]).filter(function(j){ return j.status==='open' && !proposedIds[j.id]; });
  }
  var rv = await CPR.db('reviews?contractor_id=eq.'+encodeURIComponent(me.id)+'&direction=eq.client_to_contractor&select=rating');
  rv = Array.isArray(rv)?rv:[];
  rating = { count: rv.length, avg: rv.length ? (rv.reduce(function(a,r){return a+(r.rating||0);},0)/rv.length) : 0 };
}

function statCounts(){
  var pend=0, active=0, done=0, earn=0;
  proposals.forEach(function(p){
    if(p.status==='pending'||p.status==='quoted'||p.status==='visit_requested'||p.status==='visit_accepted'||p.status==='countered'||p.status==='inquiry') pend++;
    else if(p.status==='accepted') active++;
    else if(p.status==='completed'){ done++; earn += numv(p.price)*0.90; }
  });
  return {pend:pend, active:active, done:done, earn:earn};
}
function attnItems(){
  var items=[];
  proposals.forEach(function(p){
    var j=jobsById[p.job_id]||{}; var title=j.title||(lang==='en'?'Job':'Trabajo');
    if(p.status==='visit_accepted'){ items.push({t:title,s:t('atnQuote'),href:'contractor-job.html?id='+p.job_id,k:'quote'}); }
    else if(p.status==='countered'){ items.push({t:title,s:t('atnCounter'),href:'contractor-job.html?id='+p.job_id,k:'counter'}); }
    else if(p.status==='accepted' && (j.status==='accepted'||j.status==='in_progress') && !j.scheduled_date){ items.push({t:title,s:t('atnSchedule'),href:'contractor-job.html?id='+p.job_id,k:'sched'}); }
    else if(p.status==='completed' && j.status==='completed' && !reviewedJobs[p.job_id]){ items.push({t:title,s:t('atnReview'),href:'contractor-job.html?id='+p.job_id,k:'review'}); }
  });
  return items;
}
function attnIcon(k){
  if(k==='review') return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.3 6.9.8-5.1 4.7 1.4 6.8L12 17.8 5.9 21.4l1.4-6.8L2.2 9.9l6.9-.8z"/></svg>';
  if(k==='counter') return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>';
  if(k==='sched') return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
  return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>';
}
function ratingHtml(){
  if(!rating.count) return '<span class="rating"><span style="color:var(--muted);font-weight:500">'+t('noRating')+'</span></span>';
  var full=Math.round(rating.avg);
  var stars=''; for(var i=1;i<=5;i++){ stars+= i<=full?'★':'☆'; }
  return '<span class="rating"><span class="stars">'+stars+'</span>'+rating.avg.toFixed(1)+' ('+rating.count+')</span>';
}
function jobsForYou(){
  var proposed = {}; proposals.forEach(function(p){ proposed[p.job_id]=1; }); // hide jobs I already engaged (incl. denied)
  var avail = openJobs.filter(function(j){ return !proposed[j.id]; });
  var mine = norm(tradeEs(me.trade));
  var matched = avail.filter(function(j){ return mine && norm(j.trade_needed)===mine; });
  var list = (matched.length?matched:avail).slice(0,6);
  return list;
}
function jobCard(j){
  return '<a class="job-card" href="contractor-job.html?id='+encodeURIComponent(j.id)+'">'+
    '<div class="jt">'+esc(j.title||'')+'</div>'+
    '<div class="job-meta"><span class="trade-chip">'+esc(CPR.tradeLabel(j.trade_needed))+'</span>'+(j.city?'<span>📍 '+esc(j.city)+'</span>':'')+(j.created_at?'<span>· '+t('posted')+' '+esc(fmtDate(j.created_at))+'</span>':'')+'</div>'+
    '<div class="job-foot"><span class="job-budget">'+(numv(j.budget)?money(numv(j.budget)):'<span style="color:var(--muted);font-weight:400;font-size:12.5px">'+t('noBudget')+'</span>')+'</span><span class="job-go">'+(lang==='en'?'View & quote →':'Ver y cotizar →')+'</span></div></a>';
}
function propRow(p){
  var j = jobsById[p.job_id] || {};
  var pillCls = p.status==='accepted'?'accepted':p.status==='completed'?'completed':p.status==='declined'?'declined':'pending';
  var pillTxt = p.status==='accepted'?t('ppAccepted'):p.status==='completed'?t('ppCompleted'):p.status==='declined'?t('ppDeclined'):p.status==='quoted'?t('ppQuoted'):p.status==='countered'?t('ppCountered'):p.status==='visit_requested'?t('ppVisit'):p.status==='visit_accepted'?t('ppVisitOk'):p.status==='inquiry'?t('ppInquiry'):t('ppPending');
  var price=numv(p.price);
  return '<a class="prop-row" href="contractor-job.html?id='+encodeURIComponent(p.job_id)+'">'+
    '<div class="prop-main"><div class="prop-t">'+esc(j.title||(lang==='en'?'Job':'Trabajo'))+'</div><div class="prop-s">'+(j.trade_needed?esc(CPR.tradeLabel(j.trade_needed)):'')+(j.city?' · '+esc(j.city):'')+(j.scheduled_date?' · '+esc(schedWhen(j)):'')+'</div></div>'+
    '<span class="pill '+pillCls+'">'+pillTxt+'</span>'+
    (price?'<div class="prop-price"><div class="p">'+money(price)+'</div><div class="pay">'+t('receive')+' '+money(price*0.90)+'</div></div>':'')+'</a>';
}
function render(){
  var s=statCounts();
  var avInner = me.avatar_url ? '<img src="'+esc(me.avatar_url)+'" alt="">' : FACELESS;
  var active=(me.status==='active');
  var statusBadge='<span class="status-badge '+(active?'active':'pending')+'">'+(active?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>'+t('stActive'):'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2 2"/></svg>'+t('stPending'))+'</span>';
  var forYou=jobsForYou();
  var jobsHtml = forYou.length ? '<div class="job-grid">'+forYou.map(jobCard).join('')+'</div>' :
    '<div class="empty"><h3>'+t('noJobsT')+'</h3><p>'+t('noJobsP')+'</p><a class="btn" href="contractor-discover.html">'+t('browseBtn')+'</a></div>';
  var propsHtml = proposals.length ? '<div class="prop-list">'+proposals.map(propRow).join('')+'</div>' :
    '<div class="empty"><h3>'+t('noPropsT')+'</h3><p>'+t('noPropsP')+'</p><a class="btn" href="contractor-discover.html">'+t('browseBtn')+'</a></div>';
  el('home').innerHTML =
    '<div class="hero"><div class="h-av">'+avInner+'</div>'+
      '<div class="h-main"><div class="h-eyebrow">'+t('eyebrow')+'</div><h1>'+t('hi')+', '+esc(me.first_name||me.name||'')+CPR.verifiedBadge(me.verified,18)+'</h1>'+
        '<div class="h-sub">'+statusBadge+ratingHtml()+'</div></div>'+
      '<a class="h-edit" href="contractor-calendar.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'+t('cal')+'</a>'+
      '<a class="h-edit" href="contractor-account.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"/></svg>'+t('edit')+'</a></div>'+
    '<div class="stats">'+
      '<div class="stat"><div class="v">'+s.pend+'</div><div class="k">'+t('sPending')+'</div></div>'+
      '<div class="stat"><div class="v">'+s.active+'</div><div class="k">'+t('sActive')+'</div></div>'+
      '<div class="stat"><div class="v">'+s.done+'</div><div class="k">'+t('sDone')+'</div></div>'+
      '<a class="stat stat-link" href="contractor-earnings.html"><div class="v money">'+money(s.earn)+'</div><div class="k">'+t('sEarn')+' →</div></a></div>'+
    (function(){ var a=attnItems(); return a.length ? '<div class="sec"><div class="sec-head"><h2>'+t('atnTitle')+' <span style="background:var(--rose);color:#fff;font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;vertical-align:middle">'+a.length+'</span></h2></div><div class="attn-list">'+a.map(function(x){ return '<a class="attn-card k-'+x.k+'" href="'+x.href+'"><span class="attn-ic">'+attnIcon(x.k)+'</span><span class="attn-b"><span class="attn-t">'+esc(x.t)+'</span><span class="attn-s">'+esc(x.s)+'</span></span><span class="attn-go">→</span></a>'; }).join('')+'</div></div>' : ''; })()+
    (inviteJobs.length?'<div class="sec"><div class="sec-head"><h2>'+t('invitesT')+' <span style="background:var(--blue-soft);color:var(--blue);font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;vertical-align:middle">'+inviteJobs.length+' '+(inviteJobs.length===1?t('invitesBadge'):t('invitesBadgeP'))+'</span></h2></div><div class="job-grid">'+inviteJobs.map(jobCard).join('')+'</div></div>':'')+
    '<div class="sec"><div class="sec-head"><h2>'+t('forYou')+'</h2><a href="contractor-discover.html">'+t('browseAll')+'</a></div>'+jobsHtml+'</div>'+
    '<div class="sec"><div class="sec-head"><h2>'+t('myProps')+'</h2></div>'+propsHtml+'</div>';
}
(function init(){
  if(!window.CPR){ return; }
  if(!window._sb && window.supabase){ window._sb=supabase.createClient(CPR.SUPABASE_URL, CPR.SUPABASE_PK); }
  CPR.injectNav('contractor-home', null);
  CPR.requireAuth(async function(user){
    if(user.type==='homeowner'){ location.replace('properties.html'); return; }
    me=user;
    CPR.injectNav('contractor-home', user);
    await loadHome();
    el('boot').style.display='none';
    el('home').style.display='block';
    render();
  }, (lang==='en'?'Log in to view your portal':'Inicia sesión para ver tu portal'), 'contractor');
})();
</script>
