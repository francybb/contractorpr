<style>
:root{--ink:#0B1F33;--ink-2:#3A4A5C;--muted:#6B7A8D;--blue:#1A56DB;--blue-deep:#103FA8;--blue-soft:#EBF1FE;--canvas:#F6F7F9;--card:#FFFFFF;--line:#E6E9EF;--line-2:#EFF1F5;--ok:#0E9F6E;--ok-soft:#E3F5EE;--warn:#E08A00;--warn-soft:#FBF1DF;--post:#64748B;--post-soft:#EEF1F5;--rose:#D6336C;--rose-soft:#FCE7EF;--radius:16px;--shadow:0 1px 2px rgba(11,31,51,.04),0 8px 24px -12px rgba(11,31,51,.12);--shadow-lg:0 4px 12px rgba(11,31,51,.06),0 24px 48px -16px rgba(11,31,51,.18)}

.prop-head-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px;flex-wrap:wrap}

.btn-invite:hover{background:var(--blue);color:#fff}.btn-invite svg{width:15px;height:15px}
.inv-overlay{position:fixed;inset:0;background:rgba(11,31,51,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:18px}
.inv-overlay.show{display:flex}
.inv-modal{background:#fff;border-radius:18px;width:100%;max-width:520px;max-height:86vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 64px rgba(11,31,51,.3)}
.inv-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:20px 22px 14px;border-bottom:1px solid var(--line-2)}
.inv-head h3{font-family:'Fraunces',serif;font-size:20px;font-weight:500}.inv-head p{font-size:13px;color:var(--muted);margin-top:3px}
.inv-x{background:none;border:none;font-size:17px;color:var(--muted);cursor:pointer;line-height:1;padding:4px}

.inv-segs{display:inline-flex;background:var(--canvas);border:1px solid var(--line);border-radius:9px;padding:2px}
.inv-seg{border:none;background:none;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);padding:6px 11px;border-radius:7px;cursor:pointer}.inv-seg.on{background:#fff;color:var(--blue);box-shadow:0 1px 3px rgba(11,31,51,.1)}
.inv-list{overflow-y:auto;padding:4px 14px 8px;flex:1}
.inv-row{display:flex;align-items:center;gap:12px;padding:11px 8px;border-radius:11px;cursor:pointer}
.inv-row:hover{background:var(--canvas)}
.inv-av{width:42px;height:42px;border-radius:50%;background:var(--blue-soft);color:var(--blue);display:grid;place-items:center;font-weight:700;font-size:14px;flex-shrink:0;overflow:hidden}.inv-av img{width:100%;height:100%;object-fit:cover}
.inv-info{flex:1;min-width:0}.inv-name{font-size:14px;font-weight:600}.inv-sub2{font-size:12px;color:var(--muted);margin-top:2px}
.inv-star{color:#F5A623;font-weight:600}
.inv-check{width:22px;height:22px;border:2px solid var(--line);border-radius:7px;flex-shrink:0;display:grid;place-items:center;color:#fff}
.inv-row.sel .inv-check{background:var(--blue);border-color:var(--blue)}.inv-check svg{width:14px;height:14px;opacity:0}.inv-row.sel .inv-check svg{opacity:1}
.inv-row.done{opacity:.55;cursor:default}.inv-tag{font-size:11px;font-weight:700;color:var(--ok);background:var(--ok-soft);padding:4px 9px;border-radius:16px}

.inv-empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px}

.inv-ext-t{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.inv-ext-row{display:flex;gap:8px}
.inv-ext-input{flex:1;border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-family:inherit;font-size:13.5px;color:var(--ink)}.inv-ext-input:focus{outline:none;border-color:var(--blue)}
.inv-ext-btn{background:var(--blue-soft);color:var(--blue);border:none;padding:9px 16px;border-radius:9px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}.inv-ext-btn:hover{background:var(--blue);color:#fff}.inv-ext-btn:disabled{opacity:.6;cursor:default}
.inv-ext-msg{font-size:12.5px;margin-top:7px;font-weight:500;display:none}.inv-ext-msg.ok{color:var(--ok);display:block}.inv-ext-msg.err{color:var(--rose);display:block}
.inv-link-btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;margin-top:10px;background:var(--card);border:1px solid var(--line);color:var(--ink-2);font-family:inherit;font-size:13px;font-weight:600;padding:9px 14px;border-radius:9px;cursor:pointer;transition:.15s}
.inv-link-btn:hover{border-color:var(--blue);color:var(--blue)}.inv-link-btn svg{width:15px;height:15px}.inv-link-btn.copied{background:var(--ok-soft);border-color:#BFE6D4;color:var(--ok)}
.count-badge{background:var(--blue-soft);color:var(--blue);font-size:12px;font-weight:700;padding:2px 9px;border-radius:20px}
.prop-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:12px;box-shadow:var(--shadow);transition:.16s}
.prop-card.accepted{border-color:#BFE6D4;background:linear-gradient(180deg,var(--ok-soft),#fff 60%)}
.pc-top{display:flex;align-items:center;gap:13px;margin-bottom:12px}
.pc-av{width:44px;height:44px;border-radius:50%;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:600;font-size:16px;flex-shrink:0}
.pc-who{display:flex;align-items:center;gap:13px;text-decoration:none;color:inherit;border-radius:10px;padding:4px;margin:-4px;transition:.13s}
.pc-who:hover{background:var(--line-2)}
.pc-name{font-size:15px;font-weight:700}
.pc-rating{font-size:12.5px;color:var(--warn);font-weight:600;margin-top:1px}
.pc-view{font-size:11.5px;color:var(--blue);font-weight:600;margin-top:3px}
.pc-hint{font-size:12.5px;color:var(--muted);font-weight:500;margin-top:8px}
.onhold-strip{display:flex;align-items:flex-start;gap:11px;background:var(--blue-soft);border:1px solid #D4E2FB;border-radius:13px;padding:13px 16px;margin-bottom:18px}
.onhold-strip svg{width:18px;height:18px;color:var(--blue);flex-shrink:0;margin-top:1px}
.onhold-strip .oh-main{font-size:14px;color:var(--ink)}.onhold-strip .oh-main b{font-family:'Fraunces',serif;font-weight:500}
.onhold-strip .oh-sub{font-size:12px;color:var(--muted);margin-top:2px}
.ejf{margin-bottom:14px}.ejf label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.ejf input,.ejf select,.ejf textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:14px;color:var(--ink);background:var(--card)}
.ejf textarea{resize:vertical;min-height:90px;line-height:1.5}
.ejf input:focus,.ejf select:focus,.ejf textarea:focus{outline:none;border-color:var(--blue)}
.pc-price{margin-left:auto;text-align:right}
.pc-price .v{font-family:'Fraunces',serif;font-size:22px;font-weight:500;color:var(--blue);line-height:1}
.pc-price .l{font-size:11px;color:var(--muted);margin-top:2px}
.pc-msg{font-size:13.5px;color:var(--ink-2);background:var(--canvas);border-radius:10px;padding:12px 14px;margin-bottom:14px}
.pc-actions{display:flex;gap:10px;align-items:center}
.btn-accept{background:var(--ok);color:#fff;font-weight:600;font-size:13.5px;padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-family:inherit}
.btn-accept:hover{filter:brightness(.95)}
.btn-accept:disabled{opacity:.6;cursor:not-allowed}
.btn-counter{background:var(--card);color:var(--blue);border:1px solid var(--blue);font-weight:600;font-size:13.5px;padding:10px 16px;border-radius:10px;cursor:pointer;font-family:inherit}
.btn-counter:hover{background:var(--blue-soft)}
.btn-reject{background:none;color:var(--muted);border:none;font-weight:600;font-size:13.5px;padding:10px 10px;border-radius:10px;cursor:pointer;font-family:inherit}
.btn-reject:hover{color:var(--rose)}
.btn-msg{display:inline-flex;align-items:center;gap:6px;background:var(--card);color:var(--ink-2);border:1px solid var(--line);font-weight:600;font-size:13.5px;padding:10px 15px;border-radius:10px;cursor:pointer;font-family:inherit}
.btn-msg:hover{border-color:var(--blue);color:var(--blue)}.btn-msg svg{width:15px;height:15px}
.pc-chat{border-top:1px solid var(--line-2);margin-top:14px;padding-top:6px}
.btn-ghost{border:1px solid var(--line);background:var(--card);color:var(--ink-2);font-weight:600;font-size:13.5px;padding:10px 16px;border-radius:10px}

.accepted-tag svg{width:15px;height:15px}

.empty .ei svg{width:24px;height:24px}
.empty h3{font-size:15.5px;color:var(--ink);margin-bottom:6px}
.empty p{font-size:13.5px;max-width:36ch;margin:0 auto}
.complete-bar{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;gap:14px;box-shadow:var(--shadow);flex-wrap:wrap}
.complete-bar .ct{font-size:14px;font-weight:600}.complete-bar .cs{font-size:12.5px;color:var(--muted)}
.btn-complete{background:var(--blue);color:#fff;font-weight:600;font-size:13.5px;padding:11px 18px;border-radius:10px}
.btn-complete:hover{background:var(--blue-deep)}
.soon-note{font-size:13px;color:var(--muted);background:var(--card);border:1px dashed var(--line);border-radius:12px;padding:14px 18px;margin-top:22px;display:flex;gap:9px;align-items:flex-start}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:500;padding:12px 20px;border-radius:11px;box-shadow:var(--shadow-lg);opacity:0;transition:.25s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:560px){.wrap{padding:24px 18px 60px}}
</style>

  if(bucket==='done'){ mountReviews(); if(_justCompleted){ _justCompleted=false; toast(t('reviewPrompt')); setTimeout(function(){ var r=el('myreview'); if(r) r.scrollIntoView({behavior:'smooth',block:'center'}); }, 250); } }

var _justCompleted=false;
async function finalizeComplete(){
  try{
    var accepted=proposals.filter(function(p){return p.status==='accepted';})[0];
    if(accepted){ await dbPatch('proposals','id=eq.'+encodeURIComponent(accepted.id),{status:'completed'}); }
    var c=accepted?contractorsById[accepted.contractor_id]:null;
    sendEmail('job_completed',{ homeowner_email:(currentUser&&currentUser.email)||'', contractor_email:(c&&c.email)||'', job_title:job.title, contractor_name:(c&&c.name)||'', amount:accepted?accepted.price:'' });
  }catch(e){}
  _justCompleted=true;
  await reload();
}

function mountReviews(){
  var acc=proposals.filter(function(p){return p.status==='completed'||p.status==='accepted';})[0];
  var contractor=acc?contractorsById[acc.contractor_id]:null;
  if(!contractor || !el('myreview')) return;
  CPR.reviewCard(el('myreview'), { job:job, direction:'client_to_contractor', contractor_id:contractor.id, homeowner_id:job.homeowner_id, subjectName:(contractor.name||''), contractor_email:contractor.email });
  // show the contractor's review of this client (read-only)
  CPR.db('reviews?job_id=eq.'+encodeURIComponent(job.id)+'&direction=eq.contractor_to_client&select=*').then(function(r){
    var rev=(Array.isArray(r)&&r[0])?r[0]:null; var box=el('theirreview'); if(!box) return;
    if(rev){
      var stars=''; for(var i=1;i<=5;i++){ stars+='<span style="color:'+(i<=rev.rating?'#F5A623':'#D8DEE6')+';font-size:18px">★</span>'; }
      box.innerHTML='<div style="background:#fff;border:1px solid #E6E9EF;border-radius:14px;padding:16px 18px"><div style="margin-bottom:6px">'+stars+'</div>'+(rev.comment?'<div style="font-size:14px;color:#3A4A5C;font-style:italic;line-height:1.5">"'+esc(rev.comment)+'"</div>':'')+'</div>';
    } else {
      box.innerHTML='<div style="font-size:13.5px;color:#6B7A8D">'+t('noTheirReview')+'</div>';
    }
  });
}

/* ---- Invite contractors ---- */
var invAll=[], invSelected=new Set(), invInvited=new Set(), invScope='match', invLoaded=false;
function invTradeKey(v){ if(!v) return 12; for(var i=0;i<CPR.TRADES.length;i++){ if(CPR.TRADES[i][0]===v||CPR.TRADES[i][1]===v) return i; } return 12; }
function cTradeList(c){ var arr=[]; if(c.trade) arr.push(c.trade); if(Array.isArray(c.trades)) c.trades.forEach(function(x){ arr.push(typeof x==='string'?x:(x&&(x.trade||x.name||x.value))); }); return arr.filter(Boolean); }
function matchJobTrade(c){ if(!job.trade_needed) return true; var k=invTradeKey(job.trade_needed); return cTradeList(c).some(function(tn){ return invTradeKey(tn)===k; }); }
function cName(c){ return c.company||c.name||((c.first_name||'')+' '+(c.last_name||'')).trim()||'Contratista'; }
window.openInvite=function(){
  el('inv-overlay').classList.add('show');
  el('inv-title').textContent=t('inviteTitle'); el('inv-sub').textContent=t('inviteSub');
  el('inv-search').placeholder=t('inviteSearch');
  el('inv-seg-match').textContent=t('inviteMatch'); el('inv-seg-all').textContent=t('inviteAll');
  el('inv-ext-t').textContent=t('extT'); el('inv-ext-email').placeholder=t('extPh'); el('inv-ext-btn').textContent=t('extBtn'); el('inv-ext-msg').className='inv-ext-msg';
  el('inv-link-lbl').textContent=t('share');
  if(!invLoaded){
    Promise.all([
      CPR.db('contractors?status=eq.active&select=id,name,company,first_name,last_name,trade,trades,avatar_url,rating,email,city,verified'),
      CPR.db('job_invites?job_id=eq.'+encodeURIComponent(job.id)+'&select=contractor_id')
    ]).then(function(res){
      invAll=Array.isArray(res[0])?res[0]:[];
      (Array.isArray(res[1])?res[1]:[]).forEach(function(r){ invInvited.add(r.contractor_id); });
      invLoaded=true; renderInvList();
    });
  } else { renderInvList(); }
};
window.closeInvite=function(){ el('inv-overlay').classList.remove('show'); };
window.setInvScope=function(s){ invScope=s; el('inv-seg-match').classList.toggle('on',s==='match'); el('inv-seg-all').classList.toggle('on',s==='all'); renderInvList(); };
window.toggleInvSel=function(id){ if(invInvited.has(id)) return; if(invSelected.has(id)) invSelected.delete(id); else invSelected.add(id); renderInvList(); };
function invFiltered(){
  var q=(el('inv-search').value||'').trim().toLowerCase();
  return invAll.filter(function(c){
    if(invScope==='match' && !matchJobTrade(c)) return false;
    if(q && cName(c).toLowerCase().indexOf(q)<0 && (c.city||'').toLowerCase().indexOf(q)<0) return false;
    return true;
  }).sort(function(a,b){ return (b.rating||0)-(a.rating||0); });
}
function renderInvList(){
  var list=invFiltered(), box=el('inv-list');
  if(!list.length){ box.innerHTML='<div class="inv-empty">'+t('inviteNone')+'</div>'; }
  else {
    box.innerHTML=list.map(function(c){
      var done=invInvited.has(c.id), sel=invSelected.has(c.id);
      var av=c.avatar_url?'<img src="'+esc(c.avatar_url)+'" alt="">':esc(initials(cName(c)));
      var tradeTxt=c.trade?CPR.tradeLabel(c.trade):'';
      var rate=(c.rating!=null)?'<span class="inv-star">★ '+Number(c.rating).toFixed(1)+'</span>':'<span style="color:var(--muted)">'+t('inviteRating')+'</span>';
      var sub=[tradeTxt,c.city].filter(Boolean).join(' · ');
      var right=done?'<span class="inv-tag">'+t('invited')+'</span>':'<span class="inv-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>';
      return '<div class="inv-row'+(sel?' sel':'')+(done?' done':'')+'" onclick="toggleInvSel(\''+c.id+'\')"><div class="inv-av">'+av+'</div><div class="inv-info"><div class="inv-name">'+esc(cName(c))+CPR.verifiedBadge(c.verified,13)+'</div><div class="inv-sub2">'+rate+(sub?' · '+esc(sub):'')+'</div></div>'+right+'</div>';
    }).join('');
  }
  el('inv-count').textContent=t('inviteSelected').replace('{n}',invSelected.size);
  var sb=el('inv-send'); sb.textContent=t('inviteSend'); sb.disabled=invSelected.size===0;

window.sendExternalInvite=async function(){

  msg.className='inv-ext-msg';
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ msg.textContent=t('extBad'); msg.className='inv-ext-msg err'; return; }
  var btn=el('inv-ext-btn'); btn.disabled=true;
  var clientName=currentUser?(currentUser.first_name||currentUser.name||''):'';
  try{
    await CPR.dbInsert('job_invites',{ job_id:job.id, client_id:job.homeowner_id, invite_email:email, status:'sent' });
    sendEmail('external_invite',{ invite_email:email, job_title:job.title, city:job.city||'', job_id:job.id, client_name:clientName });
    inp.value=''; msg.textContent=t('extSent'); msg.className='inv-ext-msg ok';
  }catch(e){ msg.textContent=(lang==='en'?'Could not send. Try again.':'No se pudo enviar. Intenta de nuevo.'); msg.className='inv-ext-msg err'; }

window.sendInvites=async function(){
  if(!invSelected.size) return;
  var sb=el('inv-send'); sb.disabled=true; sb.textContent=t('inviteSending');
  var ids=Array.from(invSelected);
  var clientName=currentUser?(currentUser.first_name||currentUser.name||''):'';
  for(var i=0;i<ids.length;i++){
    var cid=ids[i], c=invAll.filter(function(x){return x.id===cid;})[0];
    try{
      await CPR.dbInsert('job_invites',{ job_id:job.id, contractor_id:cid, client_id:job.homeowner_id, status:'sent' });
      invInvited.add(cid);
      if(c&&c.email){ sendEmail('job_invite',{ contractor_email:c.email, job_title:job.title, city:job.city||'', job_id:job.id, client_name:clientName }); }
    }catch(e){}
  }
  invSelected.clear(); renderInvList(); toast(t('inviteSent')); closeInvite();
};

  el('ej-title').value=job.title||''; el('ej-desc').value=job.description||'';
  var sel=el('ej-trade'); sel.innerHTML='';
  CPR.TRADES.forEach(function(tr){ var o=document.createElement('option'); o.value=tr[0]; o.textContent=(lang==='en'?tr[1]:tr[0]); sel.appendChild(o); });
  var cur=job.trade_needed||''; sel.value=cur;
  if(sel.value!==cur){ for(var j=0;j<CPR.TRADES.length;j++){ if(CPR.TRADES[j][1]===cur){ sel.value=CPR.TRADES[j][0]; break; } } }
  el('edit-overlay').classList.add('show');
};
window.closeEdit=function(){ el('edit-overlay').classList.remove('show'); };
window.saveJobEdit=async function(){
  var title=(el('ej-title').value||'').trim(), trade=el('ej-trade').value, desc=(el('ej-desc').value||'').trim();
  if(!title){ return; }
  var btn=el('ej-save'); btn.disabled=true;
  try{
    await dbPatch('jobs','id=eq.'+encodeURIComponent(job.id),{title:title, trade_needed:trade, description:desc});
    job.title=title; job.trade_needed=trade; job.description=desc;
    closeEdit(); render(); toast(t('ejSaved'));
  }catch(e){ btn.disabled=false; }
  btn.disabled=false;
};
window.toggleChat=function(propId){
  var panel=el('chat-'+propId); if(!panel) return;
  var isOpen=panel.getAttribute('data-open')==='1';
  // accordion: close every chat panel first (clear its poll)
  document.querySelectorAll('.pc-chat').forEach(function(p){ if(p._cpoll){ clearInterval(p._cpoll); p._cpoll=null; } p.style.display='none'; p.innerHTML=''; p.removeAttribute('data-open'); });
  if(!isOpen){
    panel.style.display='block'; panel.setAttribute('data-open','1');
    CPR.chatThread(panel, {proposalId:propId, meType:'homeowner', meId:currentUser.id});
    setTimeout(function(){ panel.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 80);
  }
};
async function rejectQuote(propId){
  if(!confirm(t('rejectConfirm'))) return;
  try{ await dbPatch('proposals','id=eq.'+encodeURIComponent(propId),{status:'declined'}); await reload(); toast(t('rejected')); }
  catch(e){ toast(t('accErr')); }
}
async function counterQuote(propId){
  var raw=prompt(t('counterPrompt')); if(raw==null) return;
  var c=parseFloat(String(raw).replace(/[^0-9.]/g,'')); if(!c||c<=0){ toast(t('accErr')); return; }
  try{
    await dbPatch('proposals','id=eq.'+encodeURIComponent(propId),{status:'countered',counter_price:c});
    var p=proposals.filter(function(x){return x.id===propId;})[0];
    var ct=p?contractorsById[p.contractor_id]:null;
    if(p&&ct){ sendEmail('quote_countered',{contractor_email:ct.email, job_title:job.title, job_id:job.id, original:p.price, counter:c}); }
    await reload(); toast(t('counterSent'));
  }catch(e){ toast(t('accErr')); }
}
async function acceptVisit(propId){
  var btn=event&&event.target?event.target:null;
  if(btn){ btn.disabled=true; btn.textContent=t('accepting'); }
  try{
    await dbPatch('proposals','id=eq.'+encodeURIComponent(propId),{status:'visit_accepted'});
    var p=proposals.filter(function(x){return x.id===propId;})[0];
    var c=p?contractorsById[p.contractor_id]:null;
    if(p&&c){ sendEmail('visit_accepted',{contractor_email:c.email, job_title:job.title, job_id:job.id, visit_when:fmtVisit(p)}); }
    await reload();
    toast(t('visitAccepted'));
  }catch(e){
    toast(t('accErr'));
    if(btn){ btn.disabled=false; btn.textContent=t('acceptVisit'); }
  }
}
async function acceptProposal(propId){
  var btn=event&&event.target?event.target:null;
  if(btn){ btn.disabled=true; btn.textContent=t('accepting'); }
  try{
    await dbPatch('proposals','id=eq.'+encodeURIComponent(propId),{status:'accepted'});
    await dbPatch('jobs','id=eq.'+encodeURIComponent(job.id),{status:'accepted'});
    // notify contractor
    var p=proposals.filter(function(x){return x.id===propId;})[0];
    var c=p?contractorsById[p.contractor_id]:null;
    if(p&&c){ sendEmail('proposal_accepted',{contractor_email:c.email,job_title:job.title,amount:p.price,contractor_name:c.name}); }
    await reload();
    toast(t('accepted'));
  }catch(e){
    toast(t('accErr'));
    if(btn){ btn.disabled=false; btn.textContent=t('accept'); }
  }
}

async function reload(){
  var res=await CPR.db('jobs?id=eq.'+encodeURIComponent(job.id)+'&select=*');
  job=Array.isArray(res)?res[0]:job;
  await loadProposals();
  render();
}

async function loadProposals(){
  proposals=await CPR.db('proposals?job_id=eq.'+encodeURIComponent(job.id)+'&order=created_at.desc&select=*');
  proposals=Array.isArray(proposals)?proposals:[];
  var cids=proposals.map(function(p){return p.contractor_id;}).filter(Boolean);
  contractorsById={};
  if(cids.length){
    var cs=await CPR.db('contractors?id=in.('+cids.join(',')+')&select=id,name,email,rating,verified');
    (Array.isArray(cs)?cs:[]).forEach(function(c){contractorsById[c.id]=c;});
  }
}

async function loadData(){
  var id=getParam('id');
  if(!id){ showNotFound(); return; }
  var res=await CPR.db('jobs?id=eq.'+encodeURIComponent(id)+'&select=*');
  var j=Array.isArray(res)?res[0]:null;
  if(!j || j.homeowner_id!==currentUser.id){ showNotFound(); return; }
  job=j;
  if(j.property_id){
    var pr=await CPR.db('properties?id=eq.'+encodeURIComponent(j.property_id)+'&select=id,nickname,address,type');
    prop=Array.isArray(pr)?pr[0]:null;
  }
  await loadProposals();
  el('boot').style.display='none';
  render();
}

function showNotFound(){
  el('boot').style.display='none';
  el('nf-title').textContent=t('nfTitle'); el('nf-sub').textContent=t('nfSub'); el('nf-link').textContent=t('nfLink');
  el('notfound').style.display='block';
}

(function init(){
  if(!window.CPR){ return; }
  if(!window._sb && window.supabase){ window._sb=supabase.createClient(CPR.SUPABASE_URL, CPR.SUPABASE_PK); }
  CPR.injectNav('properties', null);
  CPR.requireAuth(async function(user){
    if(user.type==='contractor'){ location.replace('contractor-home.html'); return; }
    currentUser=user;
    CPR.injectNav('properties', user);
    await loadData();
  }, (lang==='en'?'Log in to view this job':'Inicia sesión para ver este trabajo'), 'homeowner');
})();
</script>
</body>
