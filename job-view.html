<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContractingPR · Trabajo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B1F33;--ink-2:#3A4A5C;--muted:#6B7A8D;
  --blue:#1A56DB;--blue-deep:#103FA8;--blue-soft:#EBF1FE;
  --canvas:#F6F7F9;--card:#FFFFFF;--line:#E6E9EF;--line-2:#EFF1F5;
  --ok:#0E9F6E;--ok-soft:#E3F5EE;--warn:#E08A00;--warn-soft:#FBF1DF;--rose:#D6336C;--post:#64748B;--post-soft:#EEF1F5;
  --radius:16px;--shadow:0 1px 2px rgba(11,31,51,.04),0 8px 24px -12px rgba(11,31,51,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--canvas);color:var(--ink);line-height:1.5}
.wrap{max-width:660px;margin:0 auto;padding:34px 22px 80px}
.serif{font-family:'Fraunces',serif}
.loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:90px 0;color:var(--muted)}
.spinner{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.top-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px}
.back-btn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:none}
.back-btn:hover{color:var(--blue)}.back-btn svg{width:16px;height:16px}
.share-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--ink-2);background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 14px;cursor:pointer;font-family:inherit;transition:.15s}
.share-btn:hover{border-color:var(--blue);color:var(--blue)}.share-btn svg{width:15px;height:15px}
.share-btn.copied{background:var(--ok-soft);border-color:#BFE6D4;color:var(--ok)}
.job-head{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:var(--shadow);margin-bottom:18px}
.jh-trade{display:inline-block;background:var(--blue-soft);color:var(--blue);font-weight:600;font-size:12px;padding:4px 11px;border-radius:20px;margin-bottom:11px}
.job-head h1{font-family:'Fraunces',serif;font-size:27px;font-weight:500;letter-spacing:-.01em;line-height:1.12}
.jh-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:13px;color:var(--muted)}
.jh-meta .mi{display:inline-flex;align-items:center;gap:6px}.jh-meta svg{width:15px;height:15px}
.jh-desc{margin-top:16px;padding-top:16px;border-top:1px solid var(--line-2);font-size:14.5px;color:var(--ink-2);white-space:pre-wrap}
.gate{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:var(--shadow);text-align:center}
.gate h2{font-family:'Fraunces',serif;font-size:20px;font-weight:500;margin-bottom:6px}
.gate p{font-size:14px;color:var(--muted);margin-bottom:18px;max-width:420px;margin-left:auto;margin-right:auto}
.btn-primary{background:var(--blue);color:#fff;border:none;padding:13px 26px;border-radius:11px;font-weight:600;font-size:14.5px;cursor:pointer;font-family:inherit;transition:.15s;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{background:var(--blue-deep)}.btn-primary svg{width:16px;height:16px}
.btn-ghost{background:none;border:none;color:var(--blue);font-weight:600;font-size:13.5px;cursor:pointer;font-family:inherit;margin-top:14px;display:inline-block;text-decoration:none}
.btn-ghost:hover{text-decoration:underline}
.gate-foot{font-size:12px;color:var(--muted);margin-top:16px;display:flex;align-items:center;gap:7px;justify-content:center}.gate-foot svg{width:14px;height:14px;flex-shrink:0}
.notfound{text-align:center;padding:70px 20px}.notfound h2{font-family:'Fraunces',serif;font-size:22px;margin-bottom:8px}.notfound a{color:var(--blue);font-weight:600;text-decoration:none}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;padding:11px 20px;border-radius:11px;box-shadow:0 10px 30px -8px rgba(11,31,51,.5);opacity:0;transition:.25s;z-index:60;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="cpr-nav-placeholder"></div>
<div class="wrap">
  <div id="boot" class="loading"><div class="spinner"></div><span id="boot-msg">Cargando...</span></div>
  <script>(function(){try{var l=localStorage.getItem("cpr_lang")||"es";document.getElementById("boot-msg").textContent=(l==="en"?"Loading...":"Cargando...");}catch(e){}})();</script>
  <div id="notfound" class="notfound" style="display:none"><h2 id="nf-title">Trabajo no encontrado</h2><p style="margin-bottom:14px" id="nf-sub">Este trabajo ya no está disponible.</p><a href="jobs.html" id="nf-link">← Ver trabajos</a></div>
  <div id="page" style="display:none"></div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/lang.js"></script>
<script>
var lang=(window.CPR&&CPR.lang)||'es';
var job=null, client=null, viewer=null;
var T={
  back:{es:'Ver más trabajos',en:'Browse more jobs'},
  share:{es:'Copiar enlace',en:'Copy link'},copied:{es:'¡Copiado!',en:'Copied!'},
  postedBy:{es:'Publicado por',en:'Posted by'},posted:{es:'Publicado',en:'Posted'},
  bidT:{es:'¿Eres contratista? Envía tu propuesta',en:'Are you a contractor? Submit your proposal'},
  bidP:{es:'Tú fijas el precio. El cliente revisa las propuestas y elige. Sin cuota por postular — solo 10% al completar el trabajo.',en:'You set the price. The client reviews proposals and chooses. No fee to bid — just 10% when the job is done.'},
  bidBtn:{es:'Enviar propuesta',en:'Submit a proposal'},
  haveAcct:{es:'¿Ya tienes cuenta? Inicia sesión',en:'Already have an account? Log in'},
  contractorGoT:{es:'Envía tu propuesta',en:'Submit your proposal'},
  contractorGoP:{es:'Revisa los detalles y cotiza este trabajo.',en:'Review the details and quote this job.'},
  contractorBtn:{es:'Ver y cotizar',en:'View & quote'},
  ownerT:{es:'Este es tu trabajo',en:'This is your job'},ownerP:{es:'Administra las propuestas y el progreso desde tu panel.',en:'Manage proposals and progress from your dashboard.'},ownerBtn:{es:'Administrar trabajo',en:'Manage job'},
  clientT:{es:'Para enviar una propuesta necesitas una cuenta de contratista',en:'You need a contractor account to submit a proposal'},clientP:{es:'Estás conectado como cliente. Comparte este trabajo con contratistas de confianza.',en:'You’re signed in as a client. Share this job with contractors you trust.'},
  closedT:{es:'Este trabajo ya fue asignado',en:'This job has been assigned'},closedP:{es:'El cliente ya seleccionó a un contratista.',en:'The client already chose a contractor.'},
  locNote:{es:'La dirección se revela al aprobarse una visita o aceptarse una propuesta.',en:'The address is revealed once a visit is approved or a proposal is accepted.'}
};
function el(id){return document.getElementById(id);}
function t(k){var e=T[k];return e?(e[lang]||e.es):k;}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(ts){try{return new Date(ts).toLocaleDateString(lang==='en'?'en-US':'es-ES',{month:'short',day:'numeric'});}catch(e){return '';}}
function getParam(n){return new URLSearchParams(location.search).get(n);}
function toast(msg){var x=el('toast');x.textContent=msg;x.classList.add('show');setTimeout(function(){x.classList.remove('show');},1800);}

window.copyLink=function(btn){
  var url=location.href;
  function done(){ btn.classList.add('copied'); btn.querySelector('span').textContent=t('copied'); toast(t('copied')); setTimeout(function(){ btn.classList.remove('copied'); btn.querySelector('span').textContent=t('share'); },1800); }
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(url).then(done,function(){ prompt(lang==='en'?'Copy this link:':'Copia este enlace:',url); }); }
  else { prompt(lang==='en'?'Copy this link:':'Copia este enlace:',url); }
};
window.bidGate=function(){
  var id=job.id;
  CPR.requireAuth(function(user){
    if(user.type==='contractor'){ location.href='contractor-job.html?id='+encodeURIComponent(id); }
    else { toast(t('clientT')); }
  }, t('bidBtn'), 'contractor');
};

function gateHtml(){
  // job assigned/closed
  if(job.status && job.status!=='open'){
    if(viewer && viewer.type==='contractor'){ return '<div class="gate"><h2>'+t('contractorGoT')+'</h2><p>'+t('contractorGoP')+'</p><a class="btn-primary" href="contractor-job.html?id='+encodeURIComponent(job.id)+'">'+t('contractorBtn')+' →</a></div>'; }
    if(viewer && viewer.type==='homeowner' && viewer.id===job.homeowner_id){ return ownerGate(); }
    return '<div class="gate"><h2>'+t('closedT')+'</h2><p>'+t('closedP')+'</p><a class="btn-ghost" href="jobs.html">'+t('back')+' →</a></div>';
  }
  if(viewer && viewer.type==='contractor'){
    return '<div class="gate"><h2>'+t('contractorGoT')+'</h2><p>'+t('contractorGoP')+'</p><a class="btn-primary" href="contractor-job.html?id='+encodeURIComponent(job.id)+'">'+t('contractorBtn')+' →</a><div class="gate-foot">'+lockSvg()+t('locNote')+'</div></div>';
  }
  if(viewer && viewer.type==='homeowner'){
    if(viewer.id===job.homeowner_id) return ownerGate();
    return '<div class="gate"><h2>'+t('clientT')+'</h2><p>'+t('clientP')+'</p><button class="share-btn" onclick="copyLink(this)" style="margin:0 auto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.07 0l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.07 0l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg><span>'+t('share')+'</span></button></div>';
  }
  // logged out
  return '<div class="gate"><h2>'+t('bidT')+'</h2><p>'+t('bidP')+'</p><button class="btn-primary" onclick="bidGate()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>'+t('bidBtn')+'</button><br><a class="btn-ghost" onclick="bidGate()">'+t('haveAcct')+'</a><div class="gate-foot">'+lockSvg()+t('locNote')+'</div></div>';
}
function ownerGate(){ return '<div class="gate"><h2>'+t('ownerT')+'</h2><p>'+t('ownerP')+'</p><a class="btn-primary" href="job.html?id='+encodeURIComponent(job.id)+'">'+t('ownerBtn')+' →</a></div>'; }
function lockSvg(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>'; }

function render(){
  var clientName = client ? (client.first_name||client.name||'') : '';
  el('page').innerHTML=
    '<div class="top-row"><a class="back-btn" href="jobs.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>'+t('back')+'</a>'+
      '<button class="share-btn" onclick="copyLink(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.07 0l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.07 0l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg><span>'+t('share')+'</span></button></div>'+
    '<div class="job-head"><div class="jh-trade">'+esc(CPR.tradeLabel(job.trade_needed))+'</div><h1>'+esc(job.title||'')+'</h1>'+
      '<div class="jh-meta">'+
        (job.city?'<span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>'+esc(job.city)+'</span>':'')+
        (clientName?'<span class="mi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>'+t('postedBy')+' '+esc(clientName)+CPR.verifiedBadge(client&&client.verified,13)+'</span>':'')+
        (job.created_at?'<span class="mi">'+t('posted')+' '+esc(fmtDate(job.created_at))+'</span>':'')+'</div>'+
      (job.description?'<div class="jh-desc">'+esc(job.description)+'</div>':'')+'</div>'+
    gateHtml();
}
function notFound(){ el('boot').style.display='none'; el('nf-title').textContent=(lang==='en'?'Job not found':'Trabajo no encontrado'); if(lang==='en'){el('nf-sub').textContent='This job is no longer available.';el('nf-link').textContent='← Browse jobs';} el('notfound').style.display='block'; }

(function init(){
  if(!window.CPR){ return; }
  if(!window._sb && window.supabase){ window._sb=supabase.createClient(CPR.SUPABASE_URL, CPR.SUPABASE_PK); }
  CPR.injectNav('jobs', null);
  (async function(){
    var id=getParam('id'); if(!id){ notFound(); return; }
    var r=await CPR.db('jobs?id=eq.'+encodeURIComponent(id)+'&select=*');
    job=Array.isArray(r)?r[0]:null;
    if(!job){ notFound(); return; }
    if(job.homeowner_id){ var hs=await CPR.db('homeowners?id=eq.'+encodeURIComponent(job.homeowner_id)+'&select=id,first_name,name,verified'); client=(Array.isArray(hs)&&hs[0])?hs[0]:null; }
    try{ viewer=await CPR.getCurrentUser(); }catch(e){ viewer=null; }
    el('boot').style.display='none'; el('page').style.display='block';
    render();
  })();
})();
</script>
</body>
</html>
