<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContractingPR · Descubre trabajos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0B1F33;--ink-2:#3A4A5C;--muted:#6B7A8D;
  --blue:#1A56DB;--blue-deep:#103FA8;--blue-soft:#EBF1FE;
  --canvas:#F6F7F9;--card:#FFFFFF;--line:#E6E9EF;--line-2:#EFF1F5;
  --ok:#0E9F6E;--ok-soft:#E3F5EE;--warn:#E08A00;--warn-soft:#FBF1DF;--rose:#D6336C;--post:#64748B;--post-soft:#EEF1F5;
  --radius:16px;--shadow:0 1px 2px rgba(11,31,51,.04),0 8px 24px -12px rgba(11,31,51,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--canvas);color:var(--ink);line-height:1.5}
.wrap{max-width:1120px;margin:0 auto;padding:34px 22px 80px}
.serif{font-family:'Fraunces',serif}
.loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:90px 0;color:var(--muted)}
.spinner{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.back-btn{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--muted);margin-bottom:16px;background:none;border:none;cursor:pointer;font-family:inherit;text-decoration:none}
.back-btn:hover{color:var(--blue)}.back-btn svg{width:16px;height:16px}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.head h1{font-family:'Fraunces',serif;font-size:30px;font-weight:500;letter-spacing:-.02em}
.head .count{font-size:13.5px;color:var(--muted);margin-top:4px}
.view-toggle{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px}
.view-toggle button{border:none;background:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--muted);padding:7px 15px;border-radius:8px;cursor:pointer;display:inline-flex;align-items:center;gap:7px}
.view-toggle button.on{background:var(--blue);color:#fff}.view-toggle button svg{width:15px;height:15px}
.toolbar{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);margin-bottom:22px}
.tb-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.tb-row+.tb-row{margin-top:13px;padding-top:13px;border-top:1px solid var(--line-2)}
.tb-label{font-size:11.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);margin-right:2px}
.chip{border:1px solid var(--line);background:var(--card);color:var(--ink-2);font-family:inherit;font-size:12.5px;font-weight:600;padding:6px 13px;border-radius:20px;cursor:pointer;transition:.13s}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip.on{background:var(--blue);border-color:var(--blue);color:#fff}
.chip.clear{color:var(--muted)}.chip.clear.show{color:var(--rose);border-color:#F3D2DD}
.search{flex:1;min-width:160px;border:1px solid var(--line);border-radius:10px;padding:9px 13px;font-family:inherit;font-size:13.5px;color:var(--ink)}
.search:focus{outline:none;border-color:var(--blue)}
.size-toggle{display:inline-flex;background:var(--canvas);border:1px solid var(--line);border-radius:9px;padding:2px}
.size-toggle button{border:none;background:none;font-family:inherit;font-size:12px;font-weight:700;color:var(--muted);padding:6px 11px;border-radius:7px;cursor:pointer}
.size-toggle button.on{background:var(--card);color:var(--blue);box-shadow:0 1px 3px rgba(11,31,51,.1)}
/* list */
.grid{display:grid;gap:14px}
.grid.s{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
.grid.m{grid-template-columns:repeat(auto-fill,minmax(310px,1fr))}
.grid.l{grid-template-columns:repeat(auto-fill,minmax(480px,1fr))}
.jc{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);cursor:pointer;transition:.15s;display:block;text-decoration:none;color:inherit;overflow:hidden}
.jc:hover{border-color:var(--blue);box-shadow:0 6px 18px -8px rgba(26,86,219,.25);transform:translateY(-2px)}
.jc-body{padding:16px 17px}
.grid.s .jc-body{padding:13px 15px}.grid.l .jc-body{padding:20px 22px}
.jc-top{display:flex;align-items:center;gap:8px;margin-bottom:9px;flex-wrap:wrap}
.trade-chip{background:var(--blue-soft);color:var(--blue);font-weight:600;padding:3px 9px;border-radius:20px;font-size:11px}
.jc-sector{font-size:11.5px;color:var(--muted);display:inline-flex;align-items:center;gap:4px}.jc-sector svg{width:12px;height:12px}
.jc-title{font-size:15px;font-weight:600;line-height:1.25}.grid.l .jc-title{font-size:17px}
.jc-desc{font-size:13px;color:var(--ink-2);margin-top:8px;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden}
.grid.s .jc-desc{display:none}
.grid.m .jc-desc{-webkit-line-clamp:2;line-clamp:2}
.grid.l .jc-desc{-webkit-line-clamp:4;line-clamp:4}
.jc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:11px;border-top:1px solid var(--line-2);font-size:12px;color:var(--muted)}
.grid.s .jc-foot{margin-top:10px;padding-top:9px}
.jc-go{font-weight:600;color:var(--blue)}
.empty{text-align:center;padding:60px 20px;color:var(--muted);background:var(--card);border:1px dashed var(--line);border-radius:14px}
.empty h3{color:var(--ink);font-family:'Fraunces',serif;font-weight:500;margin-bottom:6px}
/* map */
#map-view{display:none}
.map-soon{text-align:center;padding:70px 24px;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
.map-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow);position:relative}
.map-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.map-head h3{font-family:'Fraunces',serif;font-size:17px;font-weight:500}
.map-legend{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--muted);font-weight:600}
.map-legend .bar{width:120px;height:9px;border-radius:5px;background:linear-gradient(90deg,#EDF1F6,#C9DBFB,#1A56DB,#103FA8)}
.pr-svg{width:100%;height:auto;display:block;touch-action:none}
.pr-svg path{stroke:#fff;stroke-width:.8;cursor:pointer;transition:fill .12s,opacity .12s}
.pr-svg path:hover{opacity:.82;stroke:var(--ink);stroke-width:1.1}
.pr-svg path.has-jobs:hover{opacity:1}
.map-tip{position:fixed;pointer-events:none;z-index:50;background:var(--ink);color:#fff;font-size:12.5px;font-weight:600;padding:7px 11px;border-radius:9px;box-shadow:0 6px 18px -6px rgba(11,31,51,.5);opacity:0;transition:opacity .1s;white-space:nowrap}
.map-tip .c{color:#9DC0FF;font-weight:700}
.map-foot{font-size:12px;color:var(--muted);margin-top:12px;display:flex;align-items:center;gap:7px;justify-content:center;text-align:center}
.map-foot svg{width:14px;height:14px;flex-shrink:0}
.map-top-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-top:16px}
.mtl-item{display:flex;align-items:center;justify-content:space-between;background:var(--canvas);border:1px solid var(--line);border-radius:9px;padding:8px 12px;font-size:12.5px;cursor:pointer;transition:.13s;text-align:left;font-family:inherit;color:var(--ink)}
.mtl-item:hover{border-color:var(--blue);color:var(--blue)}
.mtl-item b{font-family:'Fraunces',serif;color:var(--blue)}
</style>
</head>
<body>
<div id="cpr-nav-placeholder"></div>
<div class="wrap">
  <div id="boot" class="loading"><div class="spinner"></div><span id="boot-msg">Cargando...</span></div>
  <script>(function(){try{var l=localStorage.getItem("cpr_lang")||"es";document.getElementById("boot-msg").textContent=(l==="en"?"Loading...":"Cargando...");}catch(e){}})();</script>
  <div id="page" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/lang.js"></script>
<script>
var lang=(window.CPR&&CPR.lang)||'es';
var me=null, allJobs=[], selTrades=new Set(), size='m', query='', view='list';
var T={
  back:{es:'Volver al inicio',en:'Back to home'},
  title:{es:'Descubre trabajos',en:'Discover jobs'},
  count:{es:'{n} trabajos abiertos en Puerto Rico',en:'{n} open jobs across Puerto Rico'},
  vList:{es:'Lista',en:'List'},vMap:{es:'Mapa',en:'Map'},
  filterBy:{es:'Oficio',en:'Trade'},clear:{es:'Limpiar',en:'Clear'},
  searchPh:{es:'Buscar por título, descripción o municipio…',en:'Search by title, description or municipality…'},
  size:{es:'Tamaño',en:'Size'},
  posted:{es:'Publicado',en:'Posted'},noBudget:{es:'A cotizar',en:'Open quote'},
  view:{es:'Ver y cotizar →',en:'View & quote →'},
  emptyT:{es:'No hay trabajos que coincidan',en:'No matching jobs'},
  emptyP:{es:'Ajusta los filtros o vuelve más tarde.',en:'Adjust the filters or check back later.'},
  emptyAllT:{es:'Aún no hay trabajos abiertos',en:'No open jobs yet'},
  emptyAllP:{es:'Cuando los clientes publiquen trabajos, aparecerán aquí.',en:'When clients post jobs, they’ll show up here.'},
  mapSoon:{es:'El mapa interactivo de Puerto Rico llega en el próximo paso.',en:'The interactive Puerto Rico map arrives in the next step.'}
};
function el(id){return document.getElementById(id);}
function t(k){var e=T[k];return e?(e[lang]||e.es):k;}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function numv(b){var v=parseFloat(String(b||'').replace(/[^0-9.]/g,''));return isNaN(v)?0:v;}
function fmtDate(ts){try{return new Date(ts).toLocaleDateString(lang==='en'?'en-US':'es-ES',{month:'short',day:'numeric'});}catch(e){return '';}}
function tradeKey(v){ if(!v) return 12; for(var i=0;i<CPR.TRADES.length;i++){ if(CPR.TRADES[i][0]===v||CPR.TRADES[i][1]===v) return i; } return 12; }

async function load(){
  var r=await CPR.db('jobs?status=eq.open&order=created_at.desc&select=*');
  var all=Array.isArray(r)?r:[];
  // hide jobs I already engaged on (pending, quoted, denied, etc.) — they live under "My proposals"
  var mine=await CPR.db('proposals?contractor_id=eq.'+encodeURIComponent(me.id)+'&select=job_id');
  var proposed={}; (Array.isArray(mine)?mine:[]).forEach(function(p){ proposed[p.job_id]=1; });
  allJobs=all.filter(function(j){ return !proposed[j.id]; });
}
function filtered(){
  var q=query.trim().toLowerCase();
  return allJobs.filter(function(j){
    if(selTrades.size && !selTrades.has(tradeKey(j.trade_needed))) return false;
    if(q){
      var hay=((j.title||'')+' '+(j.description||'')+' '+(j.city||'')+' '+(j.trade_needed||'')).toLowerCase();
      if(hay.indexOf(q)<0) return false;
    }
    return true;
  });
}
function jobCard(j){
  var desc=(j.description||'').trim();
  return '<a class="jc" href="contractor-job.html?id='+encodeURIComponent(j.id)+'">'+
    '<div class="jc-body">'+
      '<div class="jc-top"><span class="trade-chip">'+esc(CPR.tradeLabel(j.trade_needed))+'</span>'+
        (j.city?'<span class="jc-sector"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>'+esc(j.city)+'</span>':'')+'</div>'+
      '<div class="jc-title">'+esc(j.title||'')+'</div>'+
      (desc?'<div class="jc-desc">'+esc(desc)+'</div>':'')+
      '<div class="jc-foot"><span>'+(j.created_at?t('posted')+' '+esc(fmtDate(j.created_at)):'')+'</span><span class="jc-go">'+t('view')+'</span></div>'+
    '</div></a>';
}
function renderChips(){
  var box=el('trade-chips'); if(!box) return;
  box.innerHTML=CPR.TRADES.map(function(tr,i){
    return '<button class="chip'+(selTrades.has(i)?' on':'')+'" onclick="toggleTrade('+i+')">'+esc(lang==='en'?tr[1]:tr[0])+'</button>';
  }).join('')+'<button class="chip clear'+(selTrades.size?' show':'')+'" onclick="clearTrades()">'+t('clear')+(selTrades.size?' ('+selTrades.size+')':'')+'</button>';
}
function renderList(){
  var list=filtered();
  var box=el('list-view');
  if(!allJobs.length){ box.innerHTML='<div class="empty"><h3>'+t('emptyAllT')+'</h3><p>'+t('emptyAllP')+'</p></div>'; return; }
  if(!list.length){ box.innerHTML='<div class="empty"><h3>'+t('emptyT')+'</h3><p>'+t('emptyP')+'</p></div>'; return; }
  box.innerHTML='<div class="grid '+size+'">'+list.map(jobCard).join('')+'</div>';
  el('count').textContent=t('count').replace('{n}',list.length);
}
window.toggleTrade=function(i){ if(selTrades.has(i)) selTrades.delete(i); else selTrades.add(i); renderChips(); renderList(); refreshMapIfActive(); };
window.clearTrades=function(){ selTrades.clear(); renderChips(); renderList(); refreshMapIfActive(); };
window.setSize=function(s){ size=s; try{localStorage.setItem('cpr_discover_size',s);}catch(e){} document.querySelectorAll('.size-toggle button').forEach(function(b){ b.classList.toggle('on', b.dataset.s===s); }); renderList(); };
window.setView=function(v){ view=v; el('list-view').style.display=v==='list'?'block':'none'; el('map-view').style.display=v==='map'?'block':'none'; document.querySelectorAll('.view-toggle button').forEach(function(b){ b.classList.toggle('on', b.dataset.v===v); }); if(v==='map') ensureMap(renderMap); };
/* ---- interactive PR map ---- */
function norm(s){ return (s==null?'':String(s)).normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim(); }
var _muniByNorm=null;
function muniByNorm(){ if(_muniByNorm) return _muniByNorm; _muniByNorm={}; if(window.PR_MUNI){ Object.keys(window.PR_MUNI.paths).forEach(function(n){ _muniByNorm[norm(n)]=n; }); } return _muniByNorm; }
function mapCounts(){ var by=muniByNorm(); var c={}; filtered().forEach(function(j){ var canon=by[norm(j.city)]; if(canon) c[canon]=(c[canon]||0)+1; }); return c; }
var _mapLoading=false;
function ensureMap(cb){ if(window.PR_MUNI){ cb&&cb(); return; } if(_mapLoading) return; _mapLoading=true; var s=document.createElement('script'); s.src='/pr-municipios.js'; s.onload=function(){ _mapLoading=false; cb&&cb(); }; s.onerror=function(){ _mapLoading=false; el('map-view').innerHTML='<div class="map-soon">🗺️ '+(lang==='en'?'Map data failed to load.':'No se pudo cargar el mapa.')+'</div>'; }; document.head.appendChild(s); }
function muniColor(n,max){ if(!n) return '#EDF1F6'; var tg=max>1?(n-1)/(max-1):1; function mix(a,b,t){return Math.round(a+(b-a)*t);} return 'rgb('+mix(0xC9,0x10,tg)+','+mix(0xDB,0x3F,tg)+','+mix(0xFB,0xA8,tg)+')'; }
function refreshMapIfActive(){ if(view==='map' && window.PR_MUNI) renderMap(); }
function renderMap(){
  if(!window.PR_MUNI) return;
  var counts=mapCounts(), max=0; Object.keys(counts).forEach(function(k){ if(counts[k]>max) max=counts[k]; });
  var paths=window.PR_MUNI.paths;
  var svg='<svg class="pr-svg" viewBox="'+window.PR_MUNI.viewBox+'" xmlns="http://www.w3.org/2000/svg">';
  Object.keys(paths).forEach(function(n){ var c=counts[n]||0; svg+='<path d="'+paths[n]+'" fill="'+muniColor(c,max)+'"'+(c?' class="has-jobs"':'')+' data-n="'+esc(n)+'" data-c="'+c+'"></path>'; });
  svg+='</svg>';
  var top=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];}).slice(0,12);
  var topHtml = top.length ? '<div class="map-top-list">'+top.map(function(n){ return '<button class="mtl-item" onclick="pickMuni(this.getAttribute(\'data-m\'))" data-m="'+esc(n)+'"><span>'+esc(n)+'</span><b>'+counts[n]+'</b></button>'; }).join('')+'</div>' : '';
  el('map-view').innerHTML=
    '<div class="map-card"><div class="map-head"><h3>'+(lang==='en'?'Open jobs by municipality':'Trabajos abiertos por municipio')+'</h3>'+
      '<div class="map-legend">'+(lang==='en'?'fewer':'menos')+'<span class="bar"></span>'+(lang==='en'?'more':'más')+'</div></div>'+
      svg+
      '<div class="map-foot"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>'+(lang==='en'?'Exact addresses are revealed only after a job is accepted.':'La dirección exacta se revela solo cuando aceptas el trabajo.')+'</div>'+topHtml+'</div>';
  var svgEl=el('map-view').querySelector('.pr-svg'), tip=el('map-tip');
  if(svgEl&&tip){
    svgEl.addEventListener('mousemove',function(e){ var tgt=e.target; if(tgt.tagName&&tgt.tagName.toLowerCase()==='path'){ var n=tgt.getAttribute('data-n'), c=tgt.getAttribute('data-c'); var w=(c==='1')?(lang==='en'?'job':'trabajo'):(lang==='en'?'jobs':'trabajos'); tip.innerHTML=esc(n)+' · <span class="c">'+c+' '+w+'</span>'; tip.style.opacity='1'; tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY-12)+'px'; } else { tip.style.opacity='0'; } });
    svgEl.addEventListener('mouseleave',function(){ tip.style.opacity='0'; });
    svgEl.addEventListener('click',function(e){ if(e.target.tagName&&e.target.tagName.toLowerCase()==='path' && parseInt(e.target.getAttribute('data-c'),10)>0) pickMuni(e.target.getAttribute('data-n')); });
  }
}
window.pickMuni=function(n){ var inp=el('search'); query=n; if(inp) inp.value=n; setView('list'); renderList(); var box=el('list-view'); if(box) box.scrollIntoView({behavior:'smooth',block:'start'}); };
function render(){
  el('page').innerHTML=
    '<a class="back-btn" href="contractor-home.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>'+t('back')+'</a>'+
    '<div class="head"><div><h1>'+t('title')+'</h1><div class="count" id="count"></div></div>'+
      '<div class="view-toggle"><button data-v="list" class="on" onclick="setView(\'list\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>'+t('vList')+'</button>'+
        '<button data-v="map" onclick="setView(\'map\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 8 3 16 6 23 3 23 18 16 21 8 18 1 21 1 6"/><line x1="8" y1="3" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="21"/></svg>'+t('vMap')+'</button></div></div>'+
    '<div class="toolbar"><div class="tb-row"><span class="tb-label">'+t('filterBy')+'</span><div id="trade-chips" style="display:flex;gap:8px;flex-wrap:wrap"></div></div>'+
      '<div class="tb-row"><input class="search" id="search" placeholder="'+esc(t('searchPh'))+'" oninput="onSearch(this.value)">'+
        '<span class="tb-label">'+t('size')+'</span><div class="size-toggle">'+
          '<button data-s="s" onclick="setSize(\'s\')">S</button><button data-s="m" class="on" onclick="setSize(\'m\')">M</button><button data-s="l" onclick="setSize(\'l\')">L</button></div></div></div>'+
    '<div id="list-view"></div>'+
    '<div id="map-view"><div class="map-soon">🗺️ '+t('mapSoon')+'</div></div>'+
    '<div class="map-tip" id="map-tip"></div>';
  // restore size pref
  try{ var sp=localStorage.getItem('cpr_discover_size'); if(sp&&['s','m','l'].indexOf(sp)>=0) size=sp; }catch(e){}
  document.querySelectorAll('.size-toggle button').forEach(function(b){ b.classList.toggle('on', b.dataset.s===size); });
  renderChips(); renderList();
}
var _searchTimer=null;
window.onSearch=function(v){ query=v; if(_searchTimer) clearTimeout(_searchTimer); _searchTimer=setTimeout(function(){ renderList(); refreshMapIfActive(); },160); };
(function init(){
  if(!window.CPR){ return; }
  if(!window._sb && window.supabase){ window._sb=supabase.createClient(CPR.SUPABASE_URL, CPR.SUPABASE_PK); }
  CPR.injectNav('contractor-discover', null);
  CPR.requireAuth(async function(user){
    if(user.type==='homeowner'){ location.replace('properties.html'); return; }
    me=user;
    CPR.injectNav('contractor-discover', user);
    await load();
    el('boot').style.display='none'; el('page').style.display='block';
    render();
  }, (lang==='en'?'Log in to browse jobs':'Inicia sesión para ver trabajos'), 'contractor');
})();
</script>
</body>
</html>
